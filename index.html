<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="TSDB Emprestimos, aplicativo premium para controle automatizado de emprestimos, juros, atrasos e recebimentos."
    />
    <meta name="theme-color" content="#0b0904" />
    <title>TSDB Emprestimos</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./styles.css?v=20260520-wallet-clients-v4" />
  </head>
  <body>
    <div class="loading-screen" id="loading-screen" aria-hidden="true">
      <div class="loading-card">
        <div class="loading-logo">
          <img src="./assets/tsdb-mark.svg" alt="" />
        </div>
        <strong>TSDB Emprestimos</strong>
        <span>Atualizando sua carteira financeira</span>
        <div class="loading-bar"><span></span></div>
      </div>
    </div>

    <main class="app-shell">
      <div class="app-device" aria-live="polite">
        <section class="app-content">
          <section class="screen is-active" id="screen-dashboard" data-screen-panel="dashboard"></section>
          <section class="screen" id="screen-wallet" data-screen-panel="wallet"></section>
          <section class="screen" id="screen-clients" data-screen-panel="clients"></section>
          <section class="screen" id="screen-loans" data-screen-panel="loans"></section>
          <section class="screen" id="screen-new-loan" data-screen-panel="new-loan"></section>
          <section class="screen" id="screen-calendar" data-screen-panel="calendar"></section>
          <section class="screen" id="screen-reports" data-screen-panel="reports"></section>
          <section class="screen" id="screen-settings" data-screen-panel="settings"></section>
        </section>

        <button class="fab-button" type="button" data-action="new-loan" aria-label="Cadastrar novo emprestimo">
          <i class="fa-solid fa-plus"></i>
        </button>

        <nav class="bottom-nav" aria-label="Navegacao principal">
          <button class="nav-item is-active" type="button" data-nav="dashboard">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
          </button>
          <button class="nav-item" type="button" data-nav="clients">
            <i class="fa-solid fa-users"></i>
            <span>Clientes</span>
          </button>
          <button class="nav-item" type="button" data-nav="loans">
            <i class="fa-solid fa-wallet"></i>
            <span>Emprestimos</span>
          </button>
          <button class="nav-item" type="button" data-nav="reports">
            <i class="fa-solid fa-chart-column"></i>
            <span>Relatorios</span>
          </button>
          <button class="nav-item" type="button" data-nav="settings">
            <i class="fa-solid fa-gear"></i>
            <span>Ajustes</span>
          </button>
        </nav>

        <aside class="drawer" id="app-drawer" aria-hidden="true">
          <button class="drawer-backdrop" type="button" data-action="close-drawer" aria-label="Fechar menu"></button>
          <section class="drawer-panel" id="drawer-panel" aria-label="Menu principal"></section>
        </aside>
      </div>
    </main>

    <div class="modal" id="payment-modal" aria-hidden="true">
      <div class="modal-backdrop" data-action="close-modal" data-modal="payment-modal"></div>
      <form class="modal-card" id="payment-form">
        <div class="modal-handle"></div>
        <header class="modal-header">
          <div>
            <h2>Registrar pagamento</h2>
            <p>Confirme o valor recebido para atualizar saldo, status e relatorios.</p>
          </div>
          <button class="icon-button" type="button" data-action="close-modal" data-modal="payment-modal" aria-label="Fechar">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </header>

        <input type="hidden" name="loanId" />
        <div class="form-grid">
          <label class="field">
            <span>Data do pagamento</span>
            <input type="date" name="paidAt" required />
          </label>
          <label class="field">
            <span>Valor pago</span>
            <input type="text" name="amount" inputmode="decimal" data-money required placeholder="0,00" />
          </label>
        </div>

        <label class="field">
          <span>Metodo</span>
          <select name="method">
            <option value="Pix">Pix</option>
            <option value="Dinheiro">Dinheiro</option>
            <option value="Transferencia">Transferencia</option>
            <option value="Boleto">Boleto</option>
          </select>
        </label>

        <label class="field">
          <span>Observacoes</span>
          <textarea name="notes" rows="3" placeholder="Detalhes do recebimento"></textarea>
        </label>

        <footer class="modal-actions">
          <button class="button button-ghost" type="button" data-action="close-modal" data-modal="payment-modal">
            Cancelar
          </button>
          <button class="button button-primary" type="submit">
            Salvar pagamento
          </button>
        </footer>
      </form>
    </div>

    <div class="modal" id="loan-menu-modal" aria-hidden="true">
      <div class="modal-backdrop" data-action="close-modal" data-modal="loan-menu-modal"></div>
      <div class="modal-card">
        <div class="modal-handle"></div>
        <header class="modal-header">
          <div>
            <h2>Acoes do emprestimo</h2>
            <p>Escolha uma acao para a operacao selecionada.</p>
          </div>
          <button class="icon-button" type="button" data-action="close-modal" data-modal="loan-menu-modal" aria-label="Fechar">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </header>
        <div class="menu-actions" id="loan-menu-actions"></div>
      </div>
    </div>

    <div class="modal pin-modal" id="pin-modal" aria-hidden="true">
      <form class="modal-card pin-card" id="pin-form">
        <div class="loading-logo">
          <i class="fa-solid fa-lock"></i>
        </div>
        <header class="modal-header pin-header">
          <div>
            <h2>TSDB protegido</h2>
            <p>Digite seu PIN para acessar a carteira.</p>
          </div>
        </header>
        <label class="field">
          <span>PIN de acesso</span>
          <input id="pin-input" name="pin" type="password" inputmode="numeric" autocomplete="current-password" minlength="4" required />
        </label>
        <p class="pin-error" id="pin-error" aria-live="polite"></p>
        <button class="button button-primary" type="submit">
          <i class="fa-solid fa-unlock-keyhole"></i>
          Desbloquear
        </button>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="./app.js?v=20260520-wallet-clients-v4" defer></script>
  </body>
</html>
