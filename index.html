<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="TSDB Premium, aplicativo automatizado para controle de emprestimos com juros, multas, alertas e relatorios."
    />
    <meta name="theme-color" content="#091320" />
    <title>TSDB Premium</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8l7Do1zQxQKtvw6KG4m0rX4zYx04K+w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      :root {
        --bg: #050d18;
        --bg-deep: #081321;
        --bg-glow: #102642;
        --surface: rgba(12, 24, 40, 0.86);
        --surface-soft: rgba(16, 31, 51, 0.72);
        --surface-strong: rgba(8, 18, 31, 0.98);
        --card-line: rgba(255, 255, 255, 0.08);
        --card-highlight: rgba(92, 241, 142, 0.18);
        --text: #f4f8fc;
        --text-soft: #9fb1c7;
        --text-dim: #70839d;
        --green: #49d86e;
        --green-strong: #2fbe55;
        --red: #ff6363;
        --yellow: #f6bf41;
        --blue: #5ab8ff;
        --cyan: #6fe6ff;
        --white-soft: rgba(255, 255, 255, 0.05);
        --shadow-xl: 0 30px 90px rgba(0, 0, 0, 0.45);
        --shadow-md: 0 18px 38px rgba(0, 0, 0, 0.28);
        --radius-xl: 34px;
        --radius-lg: 24px;
        --radius-md: 18px;
        --radius-sm: 14px;
        --transition: 180ms ease;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(90, 184, 255, 0.12), transparent 30%),
          radial-gradient(circle at 85% 10%, rgba(73, 216, 110, 0.12), transparent 25%),
          linear-gradient(180deg, #040b14 0%, #091320 100%);
        color: var(--text);
        font-family: "Inter", sans-serif;
      }

      body {
        overflow-x: hidden;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
        -webkit-appearance: none;
        appearance: none;
        touch-action: manipulation;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 15px 16px;
        color: var(--text);
        background: rgba(6, 14, 24, 0.86);
        outline: none;
        transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgba(90, 184, 255, 0.35);
        box-shadow: 0 0 0 4px rgba(90, 184, 255, 0.08);
      }

      input::placeholder,
      textarea::placeholder {
        color: var(--text-dim);
      }

      textarea {
        resize: vertical;
      }

      .loading-screen {
        position: fixed;
        inset: 0;
        z-index: 90;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(90, 184, 255, 0.15), transparent 28%),
          linear-gradient(180deg, rgba(5, 13, 24, 0.98), rgba(8, 18, 31, 1));
        transition: opacity 320ms ease, visibility 320ms ease;
      }

      .loading-screen.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loading-card {
        width: min(88vw, 340px);
        padding: 26px;
        border-radius: 28px;
        background: rgba(10, 22, 37, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: var(--shadow-xl);
        text-align: center;
      }

      .loading-card__logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 18px;
        border-radius: 22px;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(73, 216, 110, 0.22), rgba(90, 184, 255, 0.18));
        color: var(--text);
        font-size: 1.5rem;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .loading-card h1,
      .loading-card p {
        margin: 0;
      }

      .loading-card p {
        margin-top: 10px;
        color: var(--text-soft);
        line-height: 1.55;
      }

      .loading-bar {
        width: 100%;
        height: 8px;
        margin-top: 20px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }

      .loading-bar span {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--blue), var(--green));
        animation: loading-slide 1.5s ease-in-out infinite;
      }

      @keyframes loading-slide {
        0% {
          transform: translateX(-120%);
        }

        50% {
          transform: translateX(110%);
        }

        100% {
          transform: translateX(250%);
        }
      }

      .ambient {
        position: fixed;
        z-index: 0;
        pointer-events: none;
        filter: blur(56px);
        opacity: 0.72;
      }

      .ambient--one {
        top: -160px;
        left: -120px;
        width: 340px;
        height: 340px;
        background: rgba(90, 184, 255, 0.18);
      }

      .ambient--two {
        right: -120px;
        bottom: -40px;
        width: 360px;
        height: 360px;
        background: rgba(73, 216, 110, 0.14);
      }

      .app-shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px 16px;
      }

      .device {
        position: relative;
        width: min(100%, 430px);
        min-height: min(920px, calc(100vh - 24px));
        border-radius: 38px;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015)),
          linear-gradient(180deg, rgba(8, 18, 31, 0.96), rgba(4, 11, 19, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: var(--shadow-xl);
      }

      .device::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at top center, rgba(90, 184, 255, 0.12), transparent 28%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 18%);
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 24px 6px;
        font-size: 0.94rem;
        font-weight: 600;
      }

      .status-bar__icons {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .status-bar__icons i {
        font-size: 0.82rem;
        opacity: 0.92;
      }

      .app {
        position: relative;
        min-height: calc(100% - 40px);
        padding: 8px 18px 120px;
      }

      .screen {
        display: none;
        animation: screen-in 240ms ease;
      }

      .screen.is-active {
        display: block;
      }

      @keyframes screen-in {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .topbar--center {
        align-items: center;
      }

      .topbar__title h1,
      .topbar__title h2,
      .topbar__title p {
        margin: 0;
      }

      .topbar__title h1,
      .topbar__title h2 {
        font-size: 2rem;
        line-height: 1.08;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .topbar__title p {
        margin-top: 8px;
        color: var(--text-soft);
        line-height: 1.55;
      }

      .topbar__actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .icon-button {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text);
        transition: transform var(--transition), background var(--transition), border-color var(--transition);
      }

      .icon-button:hover,
      .icon-button:focus-visible,
      .chip-button:hover,
      .chip-button:focus-visible,
      .metric-card:hover,
      .metric-card:focus-visible,
      .list-card:hover,
      .list-card:focus-visible,
      .primary-button:hover,
      .primary-button:focus-visible,
      .secondary-button:hover,
      .secondary-button:focus-visible,
      .tab-button:hover,
      .tab-button:focus-visible,
      .nav-button:hover,
      .nav-button:focus-visible,
      .action-tile:hover,
      .action-tile:focus-visible,
      .card-link:hover,
      .card-link:focus-visible {
        transform: translateY(-1px);
      }

      .icon-button:hover,
      .icon-button:focus-visible,
      .chip-button:hover,
      .chip-button:focus-visible,
      .metric-card:hover,
      .metric-card:focus-visible,
      .list-card:hover,
      .list-card:focus-visible,
      .tab-button:hover,
      .tab-button:focus-visible,
      .action-tile:hover,
      .action-tile:focus-visible,
      .card-link:hover,
      .card-link:focus-visible {
        border-color: rgba(90, 184, 255, 0.18);
        background: rgba(255, 255, 255, 0.07);
      }

      .notification-dot {
        position: relative;
      }

      .notification-dot::after {
        content: "";
        position: absolute;
        top: 10px;
        right: 11px;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--red);
        box-shadow: 0 0 0 4px rgba(255, 99, 99, 0.14);
      }

      .stack {
        display: grid;
        gap: 16px;
        margin-top: 18px;
      }

      .card {
        border-radius: 24px;
        padding: 18px;
        background: var(--surface);
        border: 1px solid var(--card-line);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow-md);
      }

      .card--glass {
        background:
          linear-gradient(180deg, rgba(15, 28, 46, 0.92), rgba(8, 18, 31, 0.88));
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 16px;
      }

      .card-header h3,
      .card-header p,
      .card-header small {
        margin: 0;
      }

      .card-header p,
      .card-header small {
        color: var(--text-soft);
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .metric-card {
        width: 100%;
        text-align: left;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.04);
        color: var(--text);
        transition: transform var(--transition), background var(--transition), border-color var(--transition);
      }

      .metric-card__icon {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        margin-bottom: 12px;
        font-size: 0.9rem;
      }

      .metric-card__icon--green {
        background: rgba(73, 216, 110, 0.15);
        color: var(--green);
      }

      .metric-card__icon--blue {
        background: rgba(90, 184, 255, 0.18);
        color: var(--blue);
      }

      .metric-card__icon--yellow {
        background: rgba(246, 191, 65, 0.16);
        color: var(--yellow);
      }

      .metric-card__icon--red {
        background: rgba(255, 99, 99, 0.16);
        color: var(--red);
      }

      .metric-card span,
      .metric-card strong,
      .metric-card small {
        display: block;
      }

      .metric-card span {
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .metric-card strong {
        margin-top: 8px;
        font-size: 1.18rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .metric-card small {
        margin-top: 8px;
        color: var(--text-dim);
      }

      .quick-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .action-tile {
        width: 100%;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.04);
        color: var(--text);
        text-align: left;
      }

      .action-tile strong,
      .action-tile span {
        display: block;
      }

      .action-tile strong {
        font-size: 0.96rem;
      }

      .action-tile span {
        margin-top: 8px;
        color: var(--text-soft);
        font-size: 0.8rem;
        line-height: 1.45;
      }

      .overview-grid {
        display: grid;
        grid-template-columns: 156px minmax(0, 1fr);
        gap: 16px;
        align-items: center;
      }

      .donut-wrap {
        position: relative;
        width: 156px;
        height: 156px;
        margin: 0 auto;
      }

      .donut-wrap canvas {
        width: 100% !important;
        height: 100% !important;
      }

      .donut-center {
        position: absolute;
        inset: 32px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(6, 16, 28, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.05);
        text-align: center;
        padding: 0 16px;
      }

      .donut-center span {
        color: var(--text-soft);
        font-size: 0.78rem;
      }

      .donut-center strong {
        margin-top: 6px;
        display: block;
        font-size: 1.3rem;
        line-height: 1.1;
      }

      .legend-list {
        display: grid;
        gap: 12px;
      }

      .legend-row {
        display: grid;
        grid-template-columns: 12px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
      }

      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
      }

      .legend-row span {
        color: var(--text-soft);
      }

      .legend-row strong {
        font-weight: 700;
      }

      .legend-dot--green {
        background: var(--green);
      }

      .legend-dot--red {
        background: var(--red);
      }

      .legend-dot--blue {
        background: var(--blue);
      }

      .card-link {
        background: transparent;
        color: var(--green);
        padding: 0;
        font-weight: 600;
      }

      .loan-list,
      .history-list,
      .settings-list,
      .client-list {
        display: grid;
        gap: 12px;
      }

      .list-card {
        width: 100%;
        text-align: left;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.04);
        color: var(--text);
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto auto;
        gap: 12px;
        align-items: center;
        transition: transform var(--transition), background var(--transition), border-color var(--transition);
      }

      .avatar {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(90, 184, 255, 0.72), rgba(73, 216, 110, 0.56));
        font-weight: 700;
      }

      .list-card__content h4,
      .list-card__content p,
      .list-card__value strong,
      .list-card__value span {
        margin: 0;
      }

      .list-card__content h4,
      .list-card__value strong {
        font-size: 1rem;
      }

      .list-card__content p,
      .list-card__value span {
        margin-top: 6px;
        color: var(--text-soft);
        font-size: 0.88rem;
      }

      .list-card__value {
        text-align: right;
      }

      .status-indicator {
        width: 10px;
        height: 10px;
        border-radius: 999px;
      }

      .status-dot--green {
        background: var(--green);
      }

      .status-dot--yellow {
        background: var(--yellow);
      }

      .status-dot--red {
        background: var(--red);
      }

      .status-dot--blue {
        background: rgba(255, 255, 255, 0.55);
      }

      .status-text--green {
        color: var(--green) !important;
      }

      .status-text--yellow {
        color: var(--yellow) !important;
      }

      .status-text--red {
        color: var(--red) !important;
      }

      .status-text--blue {
        color: var(--blue) !important;
      }

      .tab-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .tab-button {
        background: transparent;
        color: var(--text-soft);
        padding: 0 0 10px;
        border-bottom: 2px solid transparent;
        font-weight: 500;
      }

      .tab-button.is-active {
        color: var(--green);
        border-bottom-color: var(--green);
      }

      .search-bar {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        padding: 0 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .search-bar i {
        color: var(--text-soft);
      }

      .search-bar input {
        border: 0;
        box-shadow: none;
        background: transparent;
        padding: 14px 0;
      }

      .search-bar input:focus {
        border: 0;
        box-shadow: none;
      }

      .toolbar {
        display: grid;
        gap: 14px;
        margin-top: 18px;
      }

      .detail-hero {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
      }

      .detail-hero h3,
      .detail-hero p {
        margin: 0;
      }

      .detail-hero p {
        margin-top: 6px;
      }

      .menu-ghost {
        color: var(--text-soft);
        background: transparent;
        font-size: 1.1rem;
      }

      .detail-grid {
        display: grid;
        gap: 12px;
      }

      .detail-line {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        color: var(--text-soft);
      }

      .detail-line strong {
        color: var(--text);
      }

      .late-box {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid rgba(246, 191, 65, 0.16);
        background: rgba(246, 191, 65, 0.08);
      }

      .late-box h4,
      .late-box p,
      .late-box strong {
        margin: 0;
      }

      .late-box p {
        margin-top: 6px;
        color: var(--text-soft);
      }

      .late-box strong {
        margin-top: 8px;
        display: block;
        color: var(--red);
      }

      .history-title {
        margin: 20px 0 10px;
        font-size: 1rem;
      }

      .history-item {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 12px;
        align-items: start;
        padding: 4px 0;
      }

      .history-bullet {
        width: 10px;
        height: 10px;
        margin-top: 5px;
        border-radius: 999px;
        background: var(--green);
      }

      .history-bullet--blue {
        background: var(--blue);
      }

      .history-bullet--yellow {
        background: var(--yellow);
      }

      .history-item h4,
      .history-item p,
      .history-item strong {
        margin: 0;
      }

      .history-item p {
        margin-top: 6px;
        color: var(--text-soft);
        font-size: 0.86rem;
      }

      .detail-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 20px;
      }

      .primary-button,
      .secondary-button,
      .ghost-button {
        width: 100%;
        border-radius: 16px;
        padding: 15px 16px;
        font-weight: 700;
        transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
      }

      .primary-button {
        color: #fff;
        background: linear-gradient(180deg, var(--green) 0%, var(--green-strong) 100%);
        box-shadow: 0 14px 26px rgba(47, 190, 85, 0.24);
      }

      .secondary-button {
        color: var(--text);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .ghost-button {
        color: var(--text-soft);
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .chart-box {
        margin-top: 18px;
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .chart-box h4,
      .chart-box p {
        margin: 0;
      }

      .chart-box canvas {
        width: 100% !important;
        height: 220px !important;
        margin-top: 12px;
      }

      .summary-list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .summary-line {
        display: grid;
        grid-template-columns: 12px minmax(0, 1fr) auto auto;
        gap: 10px;
        align-items: center;
      }

      .summary-line span {
        color: var(--text-soft);
      }

      .summary-line strong {
        color: var(--text);
      }

      .summary-line small {
        color: var(--text-dim);
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field span {
        color: var(--text-soft);

      .bottom-nav {

        right: 14px;

        gap: 8px;

      }

      .nav-button {
        background: transparent;
        color: var(--text-dim);
        display: grid;
        place-items: center;
        gap: 6px;
        padding: 4px;
        min-height: 52px;
      }

      .nav-button i {
        font-size: 1rem;
      }

      .nav-button small {
        font-size: 0.75rem;
      }

      .nav-button.is-active {
        color: var(--green);
      }

      .fab {
        position: absolute;
        left: 50%;
        bottom: 52px;
        z-index: 5;
        transform: translateX(-50%);
        width: 70px;
        height: 70px;

        border: 6px solid rgba(7, 18, 31, 0.98);

        position: fixed;

          linear-gradient(180deg, rgba(11, 24, 40, 0.98), rgba(7, 18, 31, 1));

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script>
      (function () {
        const STORAGE_KEY = "tsdb-premium-v1";
        const SETTINGS_KEY = "tsdb-premium-settings-v1";
        const REFRESH_MS = 60000;
        const DEFAULT_SETTINGS = {
          defaultInterestRate: 30,
          defaultDailyLateRate: 2
        };

        const demoState = {
          loans: [
            {
              id: crypto.randomUUID(),
              name: "Joao Silva",
              phone: "5571999112301",
              principal: 1000,
              interestRate: 10,
              dailyLateRate: 2,
              issueDate: "2026-05-10",
              dueDate: "2026-05-15",
              notes: "Cliente pontual, prefere Pix.",
              payments: [],
              createdAt: "2026-05-10T10:30:00",
              editedAt: null
            },
            {
              id: crypto.randomUUID(),
              name: "Maria Costa",
              phone: "5571988421008",
              principal: 2100,
              interestRate: 12,
              dailyLateRate: 1.8,
              issueDate: "2026-05-12",
              dueDate: "2026-05-29",
              notes: "Renegociar se atrasar mais de 5 dias.",
              payments: [
                {
                  id: crypto.randomUUID(),
                  paidAt: "2026-05-13",
                  amount: 300,
                  method: "Pix",
                  notes: "Entrada inicial"
                }
              ],
              createdAt: "2026-05-12T14:10:00",
              editedAt: null
            },
            {
              id: crypto.randomUUID(),
              name: "Andre Rodrigues",
              phone: "5571996018820",
              principal: 1750,
              interestRate: 14,
              dailyLateRate: 2.4,
              issueDate: "2026-04-20",
              dueDate: "2026-05-05",
              notes: "Cobrar pelo WhatsApp logo cedo.",
              payments: [],
              createdAt: "2026-04-20T08:20:00",
              editedAt: null
            },
            {
              id: crypto.randomUUID(),
              name: "Carlos Ribeiro",
              phone: "5571999771100",
              principal: 2800,
              interestRate: 10,
              dailyLateRate: 2,
              issueDate: "2026-04-01",
              dueDate: "2026-05-01",
              notes: "Emprestimo quitado para demonstracao.",
              payments: [
                {
                  id: crypto.randomUUID(),
                  paidAt: "2026-05-01",
                  amount: 3080,
                  method: "Transferencia",
                  notes: "Quitacao total"
                }
              ],
              createdAt: "2026-04-01T09:05:00",
              editedAt: null
            }
          ]
        };

        const state = {
          data: loadData(),
          settings: loadSettings(),
          activeScreen: "dashboard",
          loanFilter: "all",
          loanSearch: "",
          selectedLoanId: null,
          editingLoanId: null,
          charts: {
            status: null,
            line: null
          }
        };

        const dom = {
          loading: document.getElementById("loading-screen"),
          screens: {
            dashboard: document.getElementById("screen-dashboard"),
            loans: document.getElementById("screen-loans"),
            create: document.getElementById("screen-create"),
            reports: document.getElementById("screen-reports"),
            settings: document.getElementById("screen-settings")
          },
          navButtons: Array.from(document.querySelectorAll(".nav-button")),
          paymentModal: document.getElementById("payment-modal"),
          loanActionsModal: document.getElementById("loan-actions-modal"),
          paymentForm: document.getElementById("payment-form"),
          loanActionsBody: document.getElementById("loan-actions-body")
        };

        function loadData() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
              const parsed = JSON.parse(raw);
              if (parsed && Array.isArray(parsed.loans)) {
                return parsed;
              }
            }
          } catch (error) {}
          localStorage.setItem(STORAGE_KEY, JSON.stringify(demoState));
          return structuredClone(demoState);
        }

        function loadSettings() {
          try {
            const raw = localStorage.getItem(SETTINGS_KEY);
            if (raw) {
              return { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
            }
          } catch (error) {}
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(DEFAULT_SETTINGS));
          return { ...DEFAULT_SETTINGS };
        }

        function saveData() {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
        }

        function saveSettings() {
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
        }

        function getToday() {
          const now = new Date();
          return new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0);
        }

        function parseDate(value) {
          return new Date(String(value) + "T12:00:00");
        }

        function daysUntil(date) {
          return Math.ceil((parseDate(date) - getToday()) / 86400000);
        }

        function formatCurrency(value) {
          return new Intl.NumberFormat("pt-BR", {
            style: "currency",
            currency: "BRL"
          }).format(Number(value || 0));
        }

        function formatDate(value) {
          return new Intl.DateTimeFormat("pt-BR", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric"
          }).format(parseDate(value));
        }

        function formatPercent(value) {
          return Number(value || 0).toFixed(2).replace(".", ",") + "%";
        }

        function initials(name) {
          return String(name || "")
            .trim()
            .split(/\s+/)
            .slice(0, 2)
            .map((part) => part.charAt(0).toUpperCase())
            .join("");
        }

        function toWhatsAppPhone(phone) {
          return String(phone || "").replace(/\D/g, "");
        }

        function escapeHtml(value) {
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function getLoanComputed(loan) {
          const principal = Number(loan.principal || 0);
          const interestAmount = principal * (Number(loan.interestRate || 0) / 100);
          const totalOriginal = principal + interestAmount;
          const diff = daysUntil(loan.dueDate);
          const rawLateDays = Math.max(Math.floor((getToday() - parseDate(loan.dueDate)) / 86400000), 0);
          const paidAmount = (loan.payments || []).reduce((sum, payment) => sum + Number(payment.amount || 0), 0);
          const lateInterest = rawLateDays > 0
            ? totalOriginal * (Number(loan.dailyLateRate || 0) / 100) * rawLateDays
            : 0;
          const totalUpdated = totalOriginal + lateInterest;
          const balance = Math.max(totalUpdated - paidAmount, 0);

          let status = "em-dia";
          if (balance === 0 && paidAmount > 0) {
            status = "pago";
          } else if (rawLateDays > 0) {
            status = "atrasado";
          } else if (diff === 0) {
            status = "vence-hoje";
          } else if (diff > 0 && diff <= 5) {
            status = "proximo";
          }

          return {
            ...loan,
            principal,
            interestAmount,
            totalOriginal,
            totalUpdated,
            lateInterest,
            lateDays: rawLateDays,
            paidAmount,
            balance,
            daysRemaining: diff,
            status,
            monthlyProfit: Math.max(Math.min(paidAmount, totalOriginal) - principal, 0)
          };
        }

        function getLoans() {
          return state.data.loans
            .map(getLoanComputed)
            .sort((a, b) => parseDate(a.dueDate) - parseDate(b.dueDate));
        }

        function getSelectedLoan() {
          const loans = getLoans();
          const found = loans.find((loan) => loan.id === state.selectedLoanId);
          if (found) {
            return found;
          }
          state.selectedLoanId = loans[0] ? loans[0].id : null;
          return loans[0] || null;
        }

        function getLoanById(id) {
          return getLoans().find((loan) => loan.id === id) || null;
        }

        function getMetrics() {
          const loans = getLoans();
          const totalEmprestado = loans.reduce((sum, loan) => sum + loan.principal, 0);
          const totalReceber = loans.reduce((sum, loan) => sum + loan.totalUpdated, 0);
          const totalPago = loans.reduce((sum, loan) => sum + loan.paidAmount, 0);
          const totalAtrasado = loans
            .filter((loan) => loan.status === "atrasado")
            .reduce((sum, loan) => sum + loan.balance, 0);
          const totalEmDia = loans
            .filter((loan) => ["em-dia", "vence-hoje", "proximo"].includes(loan.status))
            .reduce((sum, loan) => sum + loan.balance, 0);
          const lucroTotal = loans.reduce((sum, loan) => sum + (loan.totalOriginal - loan.principal), 0);
          const lucroRecebido = loans.reduce((sum, loan) => sum + loan.monthlyProfit, 0);
          const clients = new Set(loans.map((loan) => loan.name.toLowerCase()));
          const vencendoHoje = loans.filter((loan) => loan.status === "vence-hoje");
          const proximos = loans.filter((loan) => loan.status === "proximo" || loan.status === "em-dia").slice(0, 5);
          const atrasados = loans.filter((loan) => loan.status === "atrasado");
          const pagos = loans.filter((loan) => loan.status === "pago");
          const percentageLate = loans.length ? Math.round((atrasados.length / loans.length) * 100) : 0;

          return {
            loans,
            totalEmprestado,
            totalReceber,
            totalPago,
            totalAtrasado,
            totalEmDia,
            lucroTotal,
            lucroRecebido,
            clientsCount: clients.size,
            vencendoHoje,
            proximos,
            atrasados,
            pagos,
            percentageLate,
            totalAberto: loans.reduce((sum, loan) => sum + loan.balance, 0)
          };
        }

        function getStatusMeta(loan) {
          if (loan.status === "pago") {
            const lastPayment = (loan.payments || []).slice().sort((a, b) => parseDate(b.paidAt) - parseDate(a.paidAt))[0];
            return {
              label: "Pago em " + formatDate(lastPayment ? lastPayment.paidAt : loan.dueDate),
              textClass: "status-text--green",
              dotClass: "status-dot--blue"
            };
          }

          if (loan.status === "atrasado") {
            return {
              label: "Vencido ha " + loan.lateDays + " dia(s)",
              textClass: "status-text--red",
              dotClass: "status-dot--red"
            };
          }

          if (loan.status === "vence-hoje") {
            return {
              label: "Vence hoje",
              textClass: "status-text--yellow",
              dotClass: "status-dot--yellow"
            };
          }

          if (loan.status === "proximo") {
            return {
              label: "Vence em " + loan.daysRemaining + " dia(s)",
              textClass: "status-text--yellow",
              dotClass: "status-dot--yellow"
            };
          }

          return {
            label: "Em dia",
            textClass: "status-text--green",
            dotClass: "status-dot--green"
          };
        }

        function getMonthSeries() {
          const loans = getLoans();
          const buckets = new Map();

          loans.forEach((loan) => {
            (loan.payments || []).forEach((payment) => {
              const date = parseDate(payment.paidAt);
              const key = String(date.getMonth() + 1).padStart(2, "0") + "/" + String(date.getFullYear()).slice(2);
              buckets.set(key, (buckets.get(key) || 0) + Number(payment.amount || 0));
            });
          });

          if (!buckets.size) {
            const labels = [];
            const values = [];
            for (let i = 5; i >= 0; i -= 1) {
              const ref = new Date();
              ref.setMonth(ref.getMonth() - i);
              labels.push(String(ref.getMonth() + 1).padStart(2, "0") + "/" + String(ref.getFullYear()).slice(2));
              values.push(0);
            }
            return { labels, values };
          }

          const entries = Array.from(buckets.entries()).sort((a, b) => {
            const [ma, ya] = a[0].split("/");
            const [mb, yb] = b[0].split("/");
            return Number("20" + ya + ma) - Number("20" + yb + mb);
          });

          return {
            labels: entries.map((entry) => entry[0]),
            values: entries.map((entry) => entry[1])
          };
        }

        function getRecentHistory(loan) {
          const history = [
            {
              type: "created",
              date: loan.issueDate,
              title: "Emprestimo criado",
              amount: loan.principal,
              description: "Valor original liberado"
            }
          ];

          (loan.payments || [])
            .slice()
            .sort((a, b) => parseDate(a.paidAt) - parseDate(b.paidAt))
            .forEach((payment) => {
              history.push({
                type: "payment",
                date: payment.paidAt,
                title: payment.method ? "Pagamento via " + payment.method : "Pagamento registrado",
                amount: payment.amount,
                description: payment.notes || "Recebimento computado automaticamente"
              });
            });

          if (loan.lateDays > 0) {
            history.push({
              type: "late",
              date: loan.dueDate,
              title: "Atualizacao automatica",
              amount: loan.lateInterest,
              description: "Juros acumulados por " + loan.lateDays + " dia(s)"
            });
          }

          return history;
        }

        function whatsappLink(loan) {
          const phone = toWhatsAppPhone(loan.phone);
          const message =

        function getFilteredLoans() {
          return getLoans().filter((loan) => {
            const matchesSearch = !state.loanSearch || loan.name.toLowerCase().includes(state.loanSearch.toLowerCase());
            if (!matchesSearch) {
              return false;
            }

            if (state.loanFilter === "all") {
              return true;
            }

            if (state.loanFilter === "on-time") {
              return ["em-dia", "vence-hoje", "proximo"].includes(loan.status);
            }

            if (state.loanFilter === "overdue") {
              return loan.status === "atrasado";
            }

            if (state.loanFilter === "paid") {
              return loan.status === "pago";
            }

            return true;
          });
        }

        function previewFromForm() {
          const baseLoan = state.editingLoanId
            ? state.data.loans.find((loan) => loan.id === state.editingLoanId)
            : null;

          const form = state._draftForm || {
            name: baseLoan ? baseLoan.name : "",
            phone: baseLoan ? baseLoan.phone : "",
            principal: baseLoan ? baseLoan.principal : "",
            interestRate: baseLoan ? baseLoan.interestRate : state.settings.defaultInterestRate,
            issueDate: baseLoan ? baseLoan.issueDate : new Date().toISOString().slice(0, 10),
            dueDate: baseLoan ? baseLoan.dueDate : getFutureDate(30),
            dailyLateRate: baseLoan ? baseLoan.dailyLateRate : state.settings.defaultDailyLateRate,
            notes: baseLoan ? baseLoan.notes : ""
          };

          const principal = Number(form.principal || 0);
          const interestRate = Number(form.interestRate || 0);
          const dailyLateRate = Number(form.dailyLateRate || 0);
          const interestAmount = principal * (interestRate / 100);
          const totalOriginal = principal + interestAmount;
          const lateProjection = totalOriginal + totalOriginal * (dailyLateRate / 100) * 3;
          const diff = form.dueDate ? daysUntil(form.dueDate) : 0;

          let statusPreview = "Em dia";
          if (diff === 0) {
            statusPreview = "Vence hoje";
          } else if (diff > 0 && diff <= 5) {
            statusPreview = "Próximo do vencimento";
          } else if (diff < 0) {
            statusPreview = "Atrasado";
          }

          return {
            form,
            interestAmount,
            totalOriginal,
            lateProjection,
            statusPreview
          };
        }

        function captureCreateFormPreview(event) {
          const form = event.currentTarget;
          const data = new FormData(form);
          state._draftForm = {
            name: String(data.get("name") || ""),
            phone: String(data.get("phone") || ""),
            principal: String(data.get("principal") || ""),
            interestRate: String(data.get("interestRate") || ""),
            issueDate: String(data.get("issueDate") || ""),
            dueDate: String(data.get("dueDate") || ""),
            dailyLateRate: String(data.get("dailyLateRate") || ""),
            notes: String(data.get("notes") || "")
          };
          renderCreateScreen();
        }

        function submitLoanForm(event) {
          event.preventDefault();
          const data = new FormData(event.currentTarget);
          const payload = {
            id: state.editingLoanId || crypto.randomUUID(),
            name: String(data.get("name") || "").trim(),
            phone: String(data.get("phone") || "").trim(),
            principal: Number(data.get("principal") || 0),
            interestRate: Number(data.get("interestRate") || 0),
            dailyLateRate: Number(data.get("dailyLateRate") || 0),
            issueDate: String(data.get("issueDate") || ""),
            dueDate: String(data.get("dueDate") || ""),
            notes: String(data.get("notes") || "").trim(),
            payments: state.editingLoanId
              ? state.data.loans.find((loan) => loan.id === state.editingLoanId).payments || []
              : [],
            createdAt: state.editingLoanId
              ? state.data.loans.find((loan) => loan.id === state.editingLoanId).createdAt
              : new Date().toISOString(),
            editedAt: state.editingLoanId ? new Date().toISOString() : null
          };

          if (!payload.name || !payload.principal || !payload.issueDate || !payload.dueDate) {
            alert("Preencha nome, valor e datas para salvar o empréstimo.");
            return;
          }

          if (parseDate(payload.dueDate) < parseDate(payload.issueDate)) {
            alert("A data de vencimento precisa ser posterior à data do empréstimo.");
            return;
          }

          if (state.editingLoanId) {
            state.data.loans = state.data.loans.map((loan) => (loan.id === state.editingLoanId ? payload : loan));
          } else {
            state.data.loans.unshift(payload);
          }

          state.selectedLoanId = payload.id;
          state.editingLoanId = null;
          state._draftForm = null;
          saveData();
          renderApp();
          openScreen("loans");
        }

        function getFutureDate(days) {
          const date = new Date();
          date.setDate(date.getDate() + days);
          return date.toISOString().slice(0, 10);
        }

        function openPaymentModal(loanId) {
          const loan = getLoanById(loanId);
          if (!loan) {
            return;
          }

          dom.paymentForm.loanId.value = loan.id;
          dom.paymentForm.paidAt.value = new Date().toISOString().slice(0, 10);
          dom.paymentForm.amount.value = loan.balance.toFixed(2);
          dom.paymentForm.method.value = "Pix";
          dom.paymentForm.notes.value = "";
          openModal("payment-modal");
        }

        function openLoanActionsModal(loanId) {
          const loan = getLoanById(loanId);
          if (!loan) {
            return;
          }

          dom.loanActionsBody.innerHTML = `
            <button type="button" class="secondary-button" data-action="open-payment-modal" data-loan-id="${loan.id}">
              Receber pagamento
            </button>
            <button type="button" class="secondary-button" data-action="open-whatsapp" data-loan-id="${loan.id}">
              Cobrar no WhatsApp
            </button>
            <button type="button" class="secondary-button" data-action="edit-loan" data-loan-id="${loan.id}">
              Editar empréstimo
            </button>
            <button type="button" class="danger-button secondary-button" data-action="delete-loan" data-loan-id="${loan.id}">
              Excluir empréstimo
            </button>
          `;
          openModal("loan-actions-modal");
        }

        function openModal(id) {
          const modal = document.getElementById(id);
          if (!modal) {
            return;
          }
          modal.classList.add("is-open");
          modal.setAttribute("aria-hidden", "false");
          document.body.style.overflow = "hidden";
        }

        function closeModal(id) {
          const modal = document.getElementById(id);
          if (!modal) {
            return;
          }
          modal.classList.remove("is-open");
          modal.setAttribute("aria-hidden", "true");
          document.body.style.overflow = "";
        }

        function submitPayment(event) {
          event.preventDefault();
          const data = new FormData(event.currentTarget);
          const loanId = String(data.get("loanId") || "");
          const amount = Number(data.get("amount") || 0);
          const paidAt = String(data.get("paidAt") || "");
          const method = String(data.get("method") || "");
          const notes = String(data.get("notes") || "");

          if (!loanId || !amount || !paidAt) {
            alert("Preencha os dados do pagamento.");
            return;
          }

          state.data.loans = state.data.loans.map((loan) => {
            if (loan.id !== loanId) {
              return loan;
            }

            return {
              ...loan,
              payments: [
                ...(loan.payments || []),
                {
                  id: crypto.randomUUID(),
                  amount,
                  paidAt,
                  method,
                  notes
                }
              ],
              editedAt: new Date().toISOString()
            };
          });

          saveData();
          closeModal("payment-modal");
          renderApp();
        }

        function editLoan(loanId) {
          const loan = state.data.loans.find((item) => item.id === loanId);
          if (!loan) {
            return;
          }
          state.editingLoanId = loanId;
          state._draftForm = {
            name: loan.name,
            phone: loan.phone,
            principal: loan.principal,
            interestRate: loan.interestRate,
            issueDate: loan.issueDate,
            dueDate: loan.dueDate,
            dailyLateRate: loan.dailyLateRate,
            notes: loan.notes
          };
          renderCreateScreen();
          openScreen("create");
          closeModal("loan-actions-modal");
        }

        function deleteLoan(loanId) {
          const loan = getLoanById(loanId);
          if (!loan) {
            return;
          }

          const confirmed = confirm("Excluir o empréstimo de " + loan.name + "? Essa ação não pode ser desfeita.");
          if (!confirmed) {
            return;
          }

          state.data.loans = state.data.loans.filter((item) => item.id !== loanId);
          if (state.selectedLoanId === loanId) {
            state.selectedLoanId = null;
          }
          saveData();
          closeModal("loan-actions-modal");
          renderApp();
        }

        function exportJson() {
          const blob = new Blob([JSON.stringify({ data: state.data, settings: state.settings }, null, 2)], {
            type: "application/json"
          });
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = "tsdb-backup-" + new Date().toISOString().slice(0, 10) + ".json";
          anchor.click();
          URL.revokeObjectURL(url);
        }

        function importJson(event) {
          const file = event.target.files && event.target.files[0];
          if (!file) {
            return;
          }

          file
            .text()
            .then((text) => {
              const parsed = JSON.parse(text);
              if (!parsed || !parsed.data || !Array.isArray(parsed.data.loans)) {
                throw new Error("Formato inválido");
              }
              state.data = parsed.data;
              state.settings = { ...DEFAULT_SETTINGS, ...(parsed.settings || {}) };
              state.selectedLoanId = null;
              state.editingLoanId = null;
              state._draftForm = null;
              saveData();
              saveSettings();
              renderApp();
              alert("Backup importado com sucesso.");
            })
            .catch(() => {
              alert("Não foi possível importar o arquivo JSON.");
            });
        }

        function clearData() {
          const confirmed = confirm("Tem certeza que deseja limpar todos os dados?");
          if (!confirmed) {
            return;
          }

          state.data = { loans: [] };
          state.selectedLoanId = null;
          state.editingLoanId = null;
          state._draftForm = null;
          saveData();
          renderApp();
        }

        function fillDefaults() {
          state._draftForm = {
            ...(state._draftForm || {}),
            interestRate: state.settings.defaultInterestRate,
            dailyLateRate: state.settings.defaultDailyLateRate,
            issueDate: (state._draftForm && state._draftForm.issueDate) || new Date().toISOString().slice(0, 10),
            dueDate: (state._draftForm && state._draftForm.dueDate) || getFutureDate(30)
          };
          renderCreateScreen();
        }

        function resetCreateForm() {
          state.editingLoanId = null;
          state._draftForm = null;
          renderCreateScreen();
        }

        function saveDefaultSettings() {
          const interestInput = document.getElementById("default-interest-rate");
          const dailyInput = document.getElementById("default-daily-rate");
          state.settings.defaultInterestRate = Number(interestInput ? interestInput.value : state.settings.defaultInterestRate);
          state.settings.defaultDailyLateRate = Number(dailyInput ? dailyInput.value : state.settings.defaultDailyLateRate);
          saveSettings();
          alert("Padrões salvos com sucesso.");
        }

        function resetFilter() {
          state.loanFilter = "all";
          state.loanSearch = "";
          renderLoansScreen();
        }

        function openWhatsApp(loanId) {
          const loan = getLoanById(loanId);
          if (!loan) {
            return;
          }
          const phone = toWhatsAppPhone(loan.phone);
          if (!phone) {
            alert("Este cliente ainda não possui telefone cadastrado.");
            return;
          }
          window.open(whatsappLink(loan), "_blank", "noopener,noreferrer");
        }

        function renderCharts() {
          const metrics = getMetrics();
          const statusCanvas = document.getElementById("status-chart");
          const lineCanvas = document.getElementById("line-chart");

          if (statusCanvas) {
            if (state.charts.status) {
              state.charts.status.destroy();
            }

            state.charts.status = new Chart(statusCanvas, {
              type: "doughnut",
              data: {
                labels: ["Em dia", "Atrasados", "Pagos"],
                datasets: [
                  {
                    data: [metrics.totalEmDia, metrics.totalAtrasado, metrics.totalPago],
                    backgroundColor: ["#49d86e", "#ff6363", "#5ab8ff"],
                    borderWidth: 0,
                    hoverOffset: 2
                  }
                ]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: "72%",
                plugins: {
                  legend: { display: false },
                  tooltip: {
                    callbacks: {
                      label(context) {
                        return context.label + ": " + formatCurrency(context.parsed);
                      }
                    }
                  }
                }
              }
            });
          }

          if (lineCanvas) {
            if (state.charts.line) {
              state.charts.line.destroy();
            }

            const series = getMonthSeries();

            state.charts.line = new Chart(lineCanvas, {
              type: "line",
              data: {
                labels: series.labels,
                datasets: [
                  {
                    label: "Recebimentos",
                    data: series.values,
                    borderColor: "#49d86e",
                    backgroundColor: "rgba(73, 216, 110, 0.14)",
                    borderWidth: 3,
                    pointRadius: 3,
                    pointBackgroundColor: "#49d86e",
                    fill: true,
                    tension: 0.38
                  }
                ]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: { display: false },
                  tooltip: {
                    callbacks: {
                      label(context) {
                        return "Recebido: " + formatCurrency(context.parsed.y);
                      }
                    }
                  }
                },
                scales: {
                  x: {
                    grid: { color: "rgba(255,255,255,0.04)" },
                    ticks: { color: "#95a8bf" }
                  },
                  y: {
                    grid: { color: "rgba(255,255,255,0.04)" },
                    ticks: {
                      color: "#95a8bf",
                      callback(value) {
                        return formatCurrency(value).replace(",00", "");
                      }
                    }
                  }
                }
              }
            });
          }
        }

        function bindGlobalEvents() {
          dom.navButtons.forEach((button) => {
            button.addEventListener("click", () => {
              openScreen(button.dataset.screen);
            });
          });

          document.body.addEventListener("click", (event) => {
            const trigger = event.target.closest("[data-action]");
            if (!trigger) {
              return;
            }

            const action = trigger.dataset.action;
            const loanId = trigger.dataset.loanId;

            if (action === "go-dashboard") {
              openScreen("dashboard");
            }

            if (action === "go-loans") {
              openScreen("loans");
            }

            if (action === "go-create") {
              state.editingLoanId = null;
              state._draftForm = null;
              renderCreateScreen();
              openScreen("create");
            }

            if (action === "go-reports") {
              openScreen("reports");
            }

            if (action === "open-settings") {
              openScreen("settings");
            }

            if (action === "filter-overdue") {
              state.loanFilter = "overdue";
              openScreen("loans");
              renderLoansScreen();
            }

            if (action === "filter-on-time") {
              state.loanFilter = "on-time";
              openScreen("loans");
              renderLoansScreen();
            }

            if (action === "set-filter") {
              state.loanFilter = trigger.dataset.filter;
              renderLoansScreen();
            }

            if (action === "select-loan") {
              state.selectedLoanId = loanId;
              renderLoansScreen();
            }

            if (action === "open-payment-modal") {
              openPaymentModal(loanId);
            }

            if (action === "open-loan-actions") {
              openLoanActionsModal(loanId);
            }

            if (action === "open-whatsapp") {
              openWhatsApp(loanId);
            }

            if (action === "edit-loan") {
              editLoan(loanId);
            }

            if (action === "delete-loan") {
              deleteLoan(loanId);
            }

            if (action === "close-modal") {
              closeModal(trigger.dataset.modal);
            }

            if (action === "save-settings") {
              saveDefaultSettings();
            }

            if (action === "fill-defaults") {
              fillDefaults();
            }

            if (action === "reset-create-form") {
              resetCreateForm();
            }

            if (action === "export-json") {
              exportJson();
            }

            if (action === "clear-data") {
              clearData();
            }

            if (action === "reset-filter") {
              resetFilter();
            }
          });

          dom.paymentForm.addEventListener("submit", submitPayment);

          document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
              closeModal("payment-modal");
              closeModal("loan-actions-modal");
            }
          });
        }

        function boot() {
          bindGlobalEvents();
          renderApp();
          setTimeout(() => dom.loading.classList.add("is-hidden"), 750);
          setInterval(() => {
            renderApp();
          }, REFRESH_MS);
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("./sw.js").catch(() => null);
          }
        }

        boot();
      })();
    </script>
  </body>
</html>
