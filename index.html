<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TSDB, app pessoal para controle de emprestimos, atrasos, recebimentos e relatorios."
    />
    <meta name="theme-color" content="#08111f" />
    <title>TSDB | Controle de Emprestimos</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="ambient ambient--left"></div>
    <div class="ambient ambient--right"></div>

    <div class="app-shell">
      <div class="phone-frame">
        <div class="phone-frame__shine"></div>

        <main class="app-surface">
          <section class="view is-active" id="dashboard"></section>
          <section class="view" id="emprestimos"></section>
          <section class="view" id="relatorios"></section>
          <section class="view" id="configuracoes"></section>
        </main>

        <button type="button" class="fab-button" data-action="open-loan" aria-label="Novo emprestimo">
          <span>+</span>
        </button>

        <nav class="mobile-nav" aria-label="Navegacao principal">
          <button type="button" class="mobile-nav__item is-active" data-view-target="dashboard">
            <small>Inicio</small>
          </button>
          <button type="button" class="mobile-nav__item" data-view-target="emprestimos">
            <small>Emprestimos</small>
          </button>
          <button type="button" class="mobile-nav__item" data-view-target="relatorios">
            <small>Relatorios</small>
          </button>
          <button type="button" class="mobile-nav__item" data-view-target="configuracoes">
            <small>Ajustes</small>
          </button>
        </nav>
      </div>
    </div>

    <div class="modal is-hidden" id="client-modal" aria-hidden="true">
      <div class="modal__backdrop" data-action="close-modal" data-modal-id="client-modal"></div>
      <div class="modal__sheet" role="dialog" aria-modal="true" aria-labelledby="client-modal-title">
        <form class="modal__card" id="client-form">
          <div class="modal__grab"></div>
          <div class="modal__header">
            <div>
              <p class="modal__eyebrow">Cadastro</p>
              <h3 id="client-modal-title">Novo cliente</h3>
            </div>
            <button type="button" class="modal__close" data-action="close-modal" data-modal-id="client-modal">
              Fechar
            </button>
          </div>

          <label class="field">
            <span>Nome</span>
            <input name="name" required placeholder="Digite o nome do devedor" />
          </label>
          <label class="field">
            <span>Telefone</span>
            <input name="phone" placeholder="(00) 00000-0000" />
          </label>
          <label class="field">
            <span>Documento</span>
            <input name="document" placeholder="Opcional" />
          </label>
          <label class="field">
            <span>Observacoes</span>
            <textarea name="notes" rows="4" placeholder="Adicione uma observacao..."></textarea>
          </label>

          <div class="modal__footer">
            <button type="button" class="button button--ghost" data-action="close-modal" data-modal-id="client-modal">
              Cancelar
            </button>
            <button type="submit" class="button button--primary">Salvar cliente</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal is-hidden" id="loan-modal" aria-hidden="true">
      <div class="modal__backdrop" data-action="close-modal" data-modal-id="loan-modal"></div>
      <div class="modal__sheet" role="dialog" aria-modal="true" aria-labelledby="loan-modal-title">
        <form class="modal__card" id="loan-form">
          <div class="modal__grab"></div>
          <div class="modal__header">
            <div>
              <p class="modal__eyebrow">Operacao</p>
              <h3 id="loan-modal-title">Novo emprestimo</h3>
            </div>
            <button type="button" class="modal__close" data-action="close-modal" data-modal-id="loan-modal">
              Fechar
            </button>
          </div>

          <label class="field">
            <span>Cliente</span>
            <select name="clientId" required id="loan-client-select"></select>
          </label>

          <div class="field-grid">
            <label class="field">
              <span>Valor emprestado</span>
              <input name="principal" type="number" min="0" step="0.01" placeholder="0,00" required />
            </label>
            <label class="field">
              <span>Juros contratado (%)</span>
              <input name="rate" type="number" min="0" step="0.1" placeholder="30" required />
            </label>
          </div>

          <div class="field-grid">
            <label class="field">
              <span>Data do emprestimo</span>
              <input name="issuedAt" type="date" required />
            </label>
            <label class="field">
              <span>Data de vencimento</span>
              <input name="dueDate" type="date" required />
            </label>
          </div>

          <div class="field-grid">
            <label class="field">
              <span>Juros por atraso (% ao dia)</span>
              <input name="lateFeeRate" type="number" min="0" step="0.1" placeholder="2" required />
            </label>
            <label class="field">
              <span>Valor final manual</span>
              <input name="manualTarget" type="number" min="0" step="0.01" placeholder="Opcional" />
            </label>
          </div>

          <label class="field">
            <span>Observacoes</span>
            <textarea name="notes" rows="4" placeholder="Garantias, combinados, local de pagamento..."></textarea>
          </label>

          <div class="modal__footer">
            <button type="button" class="button button--ghost" data-action="close-modal" data-modal-id="loan-modal">
              Cancelar
            </button>
            <button type="submit" class="button button--primary">Salvar emprestimo</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal is-hidden" id="payment-modal" aria-hidden="true">
      <div class="modal__backdrop" data-action="close-modal" data-modal-id="payment-modal"></div>
      <div class="modal__sheet" role="dialog" aria-modal="true" aria-labelledby="payment-modal-title">
        <form class="modal__card" id="payment-form">
          <div class="modal__grab"></div>
          <div class="modal__header">
            <div>
              <p class="modal__eyebrow">Recebimento</p>
              <h3 id="payment-modal-title">Registrar pagamento</h3>
            </div>
            <button type="button" class="modal__close" data-action="close-modal" data-modal-id="payment-modal">
              Fechar
            </button>
          </div>

          <label class="field">
            <span>Emprestimo</span>
            <select name="loanId" required id="payment-loan-select"></select>
          </label>

          <div class="field-grid">
            <label class="field">
              <span>Data do pagamento</span>
              <input name="paidAt" type="date" required />
            </label>
            <label class="field">
              <span>Valor pago</span>
              <input name="amount" type="number" min="0" step="0.01" placeholder="0,00" required />
            </label>
          </div>

          <label class="field">
            <span>Metodo</span>
            <input name="method" placeholder="Pix, dinheiro, transferencia..." />
          </label>
          <label class="field">
            <span>Observacoes</span>
            <textarea name="notes" rows="4" placeholder="Detalhes do recebimento"></textarea>
          </label>

          <div class="modal__footer">
            <button type="button" class="button button--ghost" data-action="close-modal" data-modal-id="payment-modal">
              Cancelar
            </button>
            <button type="submit" class="button button--primary">Salvar pagamento</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
